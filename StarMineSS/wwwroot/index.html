<!doctype html>
<html lang="ka">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Stars vs Bombs & Tic-Tac-Toe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Noto+Sans+Georgian:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* ===== Cosmic arcade palette ===== */
            --bg0: #05060f;
            --bg1: #0a0d21;
            --bg2: #121737;
            --panel: rgba(16, 21, 48, 0.68);
            --panel-solid: #10152f;
            --panel-border: rgba(255, 200, 87, 0.16);
            --panel-border-hi: rgba(100, 255, 218, 0.35);
            --text: #eef1ff;
            --muted: #8d97c7;
            --gold: #ffc857;
            --gold-deep: #ff9f43;
            --cyan: #64ffda;
            --cyan-deep: #38bdf8;
            --danger: #ff5470;
            --danger-deep: #b3123a;
            --radius: 20px;
            --radius-sm: 13px;
            --shadow: 0 20px 50px rgba(0,0,0,.55);
            --gap: 10px;
            --font-display: 'Sora', 'Noto Sans Georgian', system-ui, sans-serif;
            --font-body: 'Noto Sans Georgian', 'Sora', system-ui, sans-serif;
        }

        * {
            box-sizing: border-box
        }

        html, body {
            height: 100%;
            overflow-x: hidden;
        }

        body {
            margin: 0;
            color: var(--text);
            background: var(--bg0);
            font: 16px/1.5 var(--font-body);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            position: relative;
        }

        /* ===== Starfield backdrop (signature element) ===== */
        #starfield {
            position: fixed;
            inset: 0;
            z-index: -2;
            display: block;
            background: radial-gradient(1100px 750px at 88% -8%, #1c2a72 0%, transparent 58%), radial-gradient(900px 650px at -8% 108%, #16205e 0%, transparent 55%), linear-gradient(180deg, var(--bg1), var(--bg0) 70%);
        }

        #starfield-nebula {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            opacity: .5;
            mix-blend-mode: screen;
            background: radial-gradient(600px 300px at 20% 15%, rgba(123,97,255,.18), transparent 60%), radial-gradient(500px 380px at 80% 80%, rgba(100,255,218,.10), transparent 60%);
        }

        button {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            font-family: inherit;
        }

        .wrap {
            max-width: 1100px;
            margin: 20px auto;
            padding: 0 14px 40px;
            position: relative;
        }

        /* ===== Game switcher ===== */
        .game-selector {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 16px;
            background: linear-gradient(180deg, rgba(10,13,33,.9), rgba(10,13,33,.55));
            border-bottom: 1px solid var(--panel-border);
            backdrop-filter: blur(6px);
            position: sticky;
            top: 0;
            z-index: 20;
        }

        .switch-btn {
            font-family: var(--font-display);
            font-size: 15px;
            font-weight: 700;
            padding: 11px 22px;
            border-radius: 999px;
            border: 1px solid var(--panel-border);
            background: rgba(18,23,58,.7);
            color: var(--muted);
            cursor: pointer;
            letter-spacing: .2px;
            transition: transform .15s ease, box-shadow .2s ease, color .2s ease, border-color .2s ease;
        }

            .switch-btn:hover {
                transform: translateY(-1px);
                border-color: var(--panel-border-hi);
                color: var(--text);
            }

            .switch-btn.active {
                background: linear-gradient(135deg, var(--gold), var(--gold-deep));
                color: #1a1206;
                border-color: transparent;
                box-shadow: 0 10px 24px rgba(255, 159, 67, .35);
            }

        /* ===== Header ===== */
        .head {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 22px 0 16px;
        }

        .badgeBrand {
            width: 46px;
            height: 46px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, var(--gold), var(--gold-deep));
            box-shadow: 0 12px 26px rgba(255,159,67,.32);
            font-size: 20px;
            position: relative;
        }

            .badgeBrand.alt {
                background: linear-gradient(135deg, var(--danger), var(--cyan-deep));
                box-shadow: 0 12px 26px rgba(56,189,248,.28);
            }

            .badgeBrand::after {
                content: "";
                position: absolute;
                inset: -5px;
                border-radius: 18px;
                border: 1px solid currentColor;
                opacity: .18;
            }

        .title {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 24px;
            letter-spacing: .2px;
        }

        .subtitle {
            color: var(--muted);
            font-weight: 600;
            font-size: 14px;
            margin-top: 2px;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            padding: 14px;
        }

        .chip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 12px;
            border-radius: 12px;
            background: rgba(255,255,255,.03);
            border: 1px solid var(--panel-border);
            font-size: 13px;
            font-weight: 700;
            color: var(--muted);
            transition: border-color .2s ease;
        }

            .chip:focus-within {
                border-color: var(--panel-border-hi);
            }

            .chip input {
                width: 56px;
                background: transparent;
                border: 0;
                outline: none;
                color: var(--text);
                font-weight: 800;
                font-family: var(--font-display);
            }

            .chip.accent {
                border-color: rgba(255,200,87,.4);
                background: rgba(255,200,87,.06);
                color: var(--gold);
            }

        .btn {
            padding: 11px 18px;
            border-radius: 12px;
            border: 0;
            font-weight: 800;
            font-family: var(--font-display);
            letter-spacing: .2px;
            cursor: pointer;
            color: #071019;
            background: linear-gradient(135deg, var(--cyan), var(--cyan-deep));
            box-shadow: 0 12px 22px rgba(56,189,248,.3);
            transition: transform .12s ease, box-shadow .2s ease, filter .2s ease;
        }

            .btn:hover {
                transform: translateY(-1px);
                filter: brightness(1.05);
            }

            .btn:active {
                transform: translateY(0);
            }

            .btn.magic {
                background: linear-gradient(135deg, #b98bff, #7b61ff);
                box-shadow: 0 12px 22px rgba(123,97,255,.32);
                color: #100a2b;
            }

        .pill {
            padding: 9px 14px;
            border-radius: 999px;
            border: 1px solid var(--panel-border);
            background: rgba(255,255,255,.03);
            color: var(--muted);
            font-weight: 800;
            font-family: var(--font-display);
            cursor: pointer;
            font-size: 13px;
            transition: all .18s ease;
        }

            .pill:hover {
                color: var(--text);
                border-color: var(--panel-border-hi);
            }

            .pill.active {
                background: linear-gradient(135deg, var(--gold), var(--gold-deep));
                color: #1a1206;
                border-color: transparent;
                box-shadow: 0 8px 18px rgba(255,159,67,.3);
            }

        .right {
            margin-left: auto;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 12px;
            border-radius: 10px;
            border: 1px solid var(--panel-border);
            background: rgba(255,255,255,.03);
            color: var(--muted);
            font-weight: 700;
            font-size: 13px;
        }

            .toggle input {
                accent-color: var(--cyan);
            }

        .status {
            margin: 16px 4px 10px;
            font-weight: 800;
            font-family: var(--font-display);
            color: var(--text);
            font-size: 15px;
        }

        .progress {
            height: 10px;
            border-radius: 999px;
            background: rgba(255,255,255,.04);
            border: 1px solid var(--panel-border);
            overflow: hidden;
        }

            .progress > div {
                height: 100%;
                width: 0;
                background: linear-gradient(90deg, var(--gold), var(--cyan));
                transition: width .35s ease;
                box-shadow: 0 0 12px rgba(100,255,218,.5);
            }

        /* ===== BOARD ===== */
        .boardWrap {
            margin-top: 14px;
            padding: 14px;
            overflow: hidden;
        }

        .board {
            --cols: 5;
            display: grid;
            gap: var(--gap);
            grid-template-columns: repeat(var(--cols),1fr);
            width: 100%;
            max-width: 100%;
            background: linear-gradient(180deg, #0c1130, #080b21);
            border-radius: 22px;
            padding: 14px;
            border: 1px solid var(--panel-border);
            box-shadow: inset 0 14px 34px rgba(0,0,0,.5);
            overflow: hidden;
            clip-path: inset(0 round 20px);
            contain: layout paint;
            backface-visibility: hidden;
            transform: translateZ(0);
        }

        .cell {
            width: 100%;
            aspect-ratio: 1/1;
            display: grid;
            place-items: center;
            user-select: none;
            cursor: pointer;
            border-radius: 14px;
            font-size: 26px;
            font-weight: 900;
            color: var(--muted);
            background: linear-gradient(155deg, #1a2158, #10153a);
            border: 1px solid rgba(255,255,255,.06);
            box-shadow: inset 0 6px 16px rgba(0,0,0,.5), 0 10px 18px rgba(0,0,0,.35);
            transition: transform .1s ease, filter .18s ease, border-color .2s ease;
            backface-visibility: hidden;
            transform: translateZ(0);
            position: relative;
        }

            .cell:not(.revealed):hover {
                filter: brightness(1.18);
                border-color: rgba(100,255,218,.35);
                transform: translateY(-2px);
            }

            .cell.revealed {
                cursor: default;
            }

            .cell.star {
                background: linear-gradient(160deg, var(--gold), var(--gold-deep));
                color: #1a1206;
                border-color: rgba(255,255,255,.35);
                box-shadow: 0 0 0 1px rgba(255,255,255,.15) inset, 0 10px 22px rgba(255,159,67,.4);
                animation: popStar .32s cubic-bezier(.2,1.4,.4,1);
            }

            .cell.bomb {
                background: linear-gradient(160deg, #23283f, #0c0f22);
                color: #ff8fa3;
                border-color: rgba(255,84,112,.5);
                box-shadow: 0 0 0 1px rgba(255,84,112,.2) inset, 0 10px 22px rgba(255,84,112,.22);
                animation: popBomb .38s ease;
            }

        @keyframes popStar {
            0% {
                transform: scale(.5) rotate(-12deg);
                opacity: 0;
            }

            65% {
                transform: scale(1.12) rotate(4deg);
                opacity: 1;
            }

            100% {
                transform: scale(1) rotate(0);
            }
        }

        @keyframes popBomb {
            0% {
                transform: scale(.6);
                opacity: 0;
            }

            30% {
                transform: scale(1.08) translateX(-3px);
            }

            50% {
                transform: translateX(3px);
            }

            70% {
                transform: translateX(-2px);
            }

            100% {
                transform: scale(1) translateX(0);
                opacity: 1;
            }
        }

        .overlay {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            background: rgba(3,5,15,.62);
            backdrop-filter: blur(3px);
            opacity: 0;
            pointer-events: none;
            transition: opacity .2s ease;
            z-index: 50;
        }

            .overlay.show {
                opacity: 1;
                pointer-events: auto;
            }

        .modal {
            min-width: 280px;
            max-width: 420px;
            text-align: center;
            padding: 26px 22px;
            border-radius: 22px;
            border: 1px solid rgba(255,255,255,.18);
            box-shadow: 0 30px 60px rgba(0,0,0,.5);
        }

            .modal.win {
                background: linear-gradient(150deg, rgba(255,200,87,.97), rgba(255,159,67,.97));
                color: #2a1704;
            }

            .modal.lose {
                background: linear-gradient(150deg, rgba(255,84,112,.97), rgba(179,18,58,.97));
                color: #310613;
            }

            .modal h3 {
                margin: 0 0 8px;
                font-size: 24px;
                font-family: var(--font-display);
                font-weight: 800;
            }

            .modal p {
                margin: 0 0 16px;
                font-weight: 700;
            }

            .modal .btn {
                background: rgba(5,6,15,.85);
                color: #eef1ff;
                box-shadow: 0 10px 20px rgba(0,0,0,.35);
            }

        /* ===== Tic-Tac-Toe cells ===== */
        .ttt-cell {
            width: 100%;
            aspect-ratio: 1/1;
            font-size: 46px;
            font-weight: 900;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,.06);
            transition: transform .12s ease, filter .18s ease;
            font-family: var(--font-display);
        }

            .ttt-cell.empty {
                background: linear-gradient(155deg, #1a2158, #10153a);
                box-shadow: inset 0 6px 16px rgba(0,0,0,.5);
            }

                .ttt-cell.empty:hover {
                    filter: brightness(1.18);
                    transform: translateY(-2px);
                }

            .ttt-cell.x {
                background: linear-gradient(150deg, var(--danger), var(--danger-deep));
                color: #fff;
                box-shadow: 0 10px 22px rgba(255,84,112,.35);
                animation: popStar .28s ease;
            }

            .ttt-cell.o {
                background: linear-gradient(150deg, var(--cyan), var(--cyan-deep));
                color: #04202a;
                box-shadow: 0 10px 22px rgba(56,189,248,.35);
                animation: popStar .28s ease;
            }

        @media (max-width:480px) {
            :root {
                --gap: 6px;
            }

            .wrap {
                padding: 0 8px 32px;
            }

            .controls {
                gap: 6px;
                padding: 10px;
            }

            .panel {
                background: rgba(12,16,38,.5);
            }

            .boardWrap {
                padding: 6px;
            }

            .board {
                padding: 8px;
                gap: 6px;
            }

            .cell {
                border-radius: 12px;
                font-size: 21px;
            }

            .title {
                font-size: 20px;
            }

            .status {
                margin: 12px 6px 8px;
            }

            .progress {
                margin: 0 6px 10px;
            }
        }
    </style>
</head>
<body>

    <canvas id="starfield-canvas"></canvas>
    <div id="starfield"></div>
    <div id="starfield-nebula"></div>

    <div class="game-selector">
        <button class="switch-btn active" onclick="switchGame('stars-bombs', this)">⭐ Stars vs Bombs</button>
        <button class="switch-btn" onclick="switchGame('tictactoe', this)">❌⭕ Tic-Tac-Toe</button>
    </div>

    <div id="game-stars-bombs" class="game-screen">
        <div class="wrap">
            <div class="head">
                <div class="badgeBrand">⭐</div>
                <div>
                    <div class="title">Stars vs Bombs</div>
                    <div class="subtitle">გახსენი ვარსკვლავები — მოერიდე ბომბებს</div>
                </div>
            </div>

            <div class="panel controls">
                <div class="chip">Rows <input id="rows" type="number" min="2" max="12" value="5"></div>
                <div class="chip">Cols <input id="cols" type="number" min="2" max="12" value="5"></div>
                <div class="chip">Mines <input id="mines" type="number" min="1" value="3"></div>
                <div class="chip accent">🤖 ავტო კლიკი: <input id="autoClicks" type="number" min="1" max="50" value="8"></div>
                <button class="pill" data-preset="easy">Easy</button>
                <button class="pill" data-preset="medium">Medium</button>
                <button class="pill" data-preset="hard">Hard</button>
                <button id="btnAutoPlay" class="btn magic">▶ Auto Play</button>
                <button id="btnNew" class="btn">New Game</button>

                <div class="right">
                    <div class="chip" id="sizeBadge">Size: 5×5</div>
                    <div class="chip" id="minesBadge">Mines: 3</div>
                    <div class="chip" id="safeBadge">Safe: 0 / 22</div>
                    <label class="toggle"><input id="mute" type="checkbox">🔇 Mute</label>
                    <label class="toggle">🔊 Vol <input id="vol" type="range" min="0" max="1" step="0.01" value="0.8" style="width:100px"></label>
                </div>
            </div>

            <div class="status" id="status">Open the stars — avoid the bombs.</div>
            <div class="progress panel" style="margin-bottom:8px"><div id="progress"></div></div>

            <div class="panel boardWrap">
                <div id="board" class="board"></div>
            </div>
        </div>
    </div>

    <div id="game-tictactoe" class="game-screen" style="display: none;">
        <div class="wrap">
            <div class="head">
                <div class="badgeBrand alt">XO</div>
                <div>
                    <div class="title">Tic-Tac-Toe</div>
                    <div class="subtitle">კლასიკური კრესტიკი და ნოლიკი 🤖 ბოტის წინააღმდეგ</div>
                </div>
            </div>

            <div class="panel controls" style="justify-content: center;">
                <button class="btn" onclick="startTicTacToe()">🔄 New Game</button>
            </div>

            <div class="panel boardWrap" style="max-width: 400px; margin: 20px auto;">
                <div id="tictactoe-board" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: linear-gradient(180deg,#0c1130,#080b21); padding: 14px; border-radius: 22px;">
                </div>
            </div>
        </div>
    </div>

    <div id="overlay" class="overlay">
        <div id="modal" class="modal">
            <h3 id="modalTitle"></h3>
            <p id="modalText"></p>
            <button class="btn" id="btnOverlayPlayAgain">Play Again</button>
        </div>
    </div>

    <script>
        // ==============================================
        // STARFIELD (signature ambient element)
        // ==============================================
        (function initStarfield() {
            const canvas = document.getElementById('starfield-canvas');
            const ctx = canvas.getContext('2d');
            let w, h, stars = [], shooting = [];
            const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
                canvas.style.position = 'fixed';
                canvas.style.inset = '0';
                canvas.style.zIndex = '-2';
                const count = Math.min(160, Math.floor((w * h) / 9000));
                stars = Array.from({ length: count }, () => ({
                    x: Math.random() * w, y: Math.random() * h,
                    r: Math.random() * 1.4 + .3,
                    baseA: Math.random() * .5 + .3,
                    phase: Math.random() * Math.PI * 2,
                    speed: Math.random() * .015 + .005
                }));
            }
            window.addEventListener('resize', resize);
            resize();

            function maybeSpawnShootingStar() {
                if (reduceMotion) return;
                if (Math.random() < .0035 && shooting.length < 2) {
                    const y0 = Math.random() * h * .4;
                    shooting.push({ x: -50, y: y0, len: 90 + Math.random() * 60, speed: 8 + Math.random() * 5, life: 1 });
                }
            }

            function frame(t) {
                ctx.clearRect(0, 0, w, h);
                for (const s of stars) {
                    const a = reduceMotion ? s.baseA : s.baseA + Math.sin(t * s.speed + s.phase) * .25;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(238,241,255,${Math.max(0, a)})`;
                    ctx.fill();
                }
                maybeSpawnShootingStar();
                shooting.forEach(sh => {
                    ctx.save();
                    const grad = ctx.createLinearGradient(sh.x, sh.y, sh.x - sh.len, sh.y - sh.len * .35);
                    grad.addColorStop(0, 'rgba(255,220,140,.9)');
                    grad.addColorStop(1, 'rgba(255,220,140,0)');
                    ctx.strokeStyle = grad;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(sh.x, sh.y);
                    ctx.lineTo(sh.x - sh.len, sh.y - sh.len * .35);
                    ctx.stroke();
                    ctx.restore();
                    sh.x += sh.speed; sh.y += sh.speed * .35;
                });
                shooting = shooting.filter(sh => sh.x < w + 100);
                requestAnimationFrame(frame);
            }
            requestAnimationFrame(frame);
        })();

        // ==============================================
        // TAB SWITCHER LOGIC
        // ==============================================
        function switchGame(gameId, buttonElement) {
            if (typeof autoPlayActive !== 'undefined') autoPlayActive = false;
            document.querySelectorAll('.game-screen').forEach(screen => screen.style.display = 'none');
            document.getElementById(`game-${gameId}`).style.display = 'block';

            document.querySelectorAll('.game-selector .switch-btn').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');

            if (gameId === 'tictactoe' && !currentTicTacToeId) startTicTacToe();
        }

        // ==============================================
        // COMMON AUDIO LOGIC
        // ==============================================
        let audio, gain, unlocked = false;
        function ensureAudio() {
            if (unlocked) return;
            audio = new (window.AudioContext || window.webkitAudioContext)();
            audio.resume && audio.resume();
            gain = audio.createGain(); gain.gain.value = parseFloat(document.getElementById('vol').value || '0.8');
            gain.connect(audio.destination);
            unlocked = true;
        }
        function setVolume(v) { if (gain) gain.gain.value = v; }
        function isMuted() { return document.getElementById('mute').checked; }
        document.body.addEventListener('pointerdown', () => ensureAudio(), { once: true });
        document.getElementById('vol').addEventListener('input', e => setVolume(parseFloat(e.target.value || '0.6')));

        function playStar() {
            if (isMuted() || !unlocked) return;
            const now = audio.currentTime, o = audio.createOscillator(), g = audio.createGain();
            o.type = "triangle"; o.frequency.setValueAtTime(880, now); o.frequency.exponentialRampToValueAtTime(1320, now + .08);
            g.gain.setValueAtTime(.0001, now); g.gain.exponentialRampToValueAtTime(.4, now + .01); g.gain.exponentialRampToValueAtTime(.0001, now + .35);
            o.connect(g); g.connect(gain); o.start(now); o.stop(now + .4);
        }
        function playBomb() {
            if (isMuted() || !unlocked) return;
            const now = audio.currentTime, o = audio.createOscillator(), g = audio.createGain();
            o.type = "sine"; o.frequency.setValueAtTime(90, now); o.frequency.exponentialRampToValueAtTime(40, now + .25);
            g.gain.setValueAtTime(.0001, now); g.gain.exponentialRampToValueAtTime(.6, now + .01); g.gain.exponentialRampToValueAtTime(.0001, now + .4);
            o.connect(g); g.connect(gain); o.start(now); o.stop(now + .45);
            const buffer = audio.createBuffer(1, audio.sampleRate * .5, audio.sampleRate), data = buffer.getChannelData(0);
            for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
            const noise = audio.createBufferSource(); noise.buffer = buffer;
            const nGain = audio.createGain(); nGain.gain.value = .35; nGain.gain.exponentialRampToValueAtTime(.0001, now + .5);
            const lp = audio.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = 500;
            noise.connect(lp); lp.connect(nGain); nGain.connect(gain); noise.start(now); noise.stop(now + .5);
        }

        function showOverlay(win, title, text, restartFunc) {
            const o = document.getElementById('overlay'), m = document.getElementById('modal');
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalText').textContent = text;
            m.className = `modal ${win ? 'win' : 'lose'}`;
            o.classList.add('show');
            document.getElementById('btnOverlayPlayAgain').onclick = () => { dismissOverlay(); restartFunc(); };
        }
        function hideOverlay() { document.getElementById('overlay').classList.remove('show'); }
        function dismissOverlay() { hideOverlay(); }

        // ==============================================
        // STARS VS BOMBS LOGIC
        // ==============================================
        let state = null;
        const rowsEl = document.getElementById('rows'), colsEl = document.getElementById('cols'), minesEl = document.getElementById('mines');

        [...document.querySelectorAll('.pill[data-preset]')].forEach(p => {
            p.addEventListener('click', () => {
                [...document.querySelectorAll('.pill[data-preset]')].forEach(x => x.classList.remove('active'));
                p.classList.add('active');
                if (p.dataset.preset === 'easy') { rowsEl.value = 5; colsEl.value = 5; minesEl.value = 3; }
                if (p.dataset.preset === 'medium') { rowsEl.value = 6; colsEl.value = 6; minesEl.value = 6; }
                if (p.dataset.preset === 'hard') { rowsEl.value = 8; colsEl.value = 8; minesEl.value = 10; }
                autoPlayActive = false; newGame();
            });
        });

        function syncBadges() {
            const rows = +rowsEl.value || 5, cols = +colsEl.value || 5;
            const maxM = Math.max(1, rows * cols - 1);
            if (+minesEl.value > maxM) minesEl.value = maxM;
            if (+minesEl.value < 1) minesEl.value = 1;
            document.getElementById('sizeBadge').textContent = `Size: ${rows}×${cols}`;
            document.getElementById('minesBadge').textContent = `Mines: ${minesEl.value}`;
        }
        ['input', 'change'].forEach(evt => [rowsEl, colsEl, minesEl].forEach(el => el.addEventListener(evt, syncBadges)));

        document.getElementById('btnNew').addEventListener('click', () => { autoPlayActive = false; newGame(); });

        async function newGame() {
            try {
                syncBadges();
                const rows = +rowsEl.value || 5, cols = +colsEl.value || 5, mines = Math.min(+minesEl.value || 3, rows * cols - 1);
                const res = await fetch(`/api/game/new?rows=${rows}&cols=${cols}&mines=${mines}`, { method: 'POST' });
                if (!res.ok) throw new Error(await res.text());
                state = await res.json();
                hideOverlay(); render();
            } catch (e) { console.error(e); document.getElementById('status').textContent = 'Failed to start game. Check API.'; }
        }

        async function reveal(r, c) {
            if (!state || state.gameOver) return;
            try {
                const res = await fetch(`/api/game/${state.id}/reveal?r=${r}&c=${c}`, { method: 'POST' });
                if (!res.ok) throw new Error(await res.text());
                state = await res.json();
                const t = state.board[r][c]; if (t === 'bomb') playBomb(); else playStar();
                render(true);
            } catch (e) { console.error(e); }
        }

        function render() {
            const board = document.getElementById('board');
            board.style.setProperty('--cols', state.cols);
            board.innerHTML = '';
            for (let r = 0; r < state.rows; r++) {
                for (let c = 0; c < state.cols; c++) {
                    const t = state.board[r][c], el = document.createElement('button');
                    el.className = `cell ${t}${t !== 'hidden' ? ' revealed' : ''}`;
                    el.textContent = t === 'hidden' ? '' : (t === 'bomb' ? '💣' : '⭐');
                    if (t === 'hidden' && !state.gameOver) el.addEventListener('click', () => { autoPlayActive = false; reveal(r, c); });
                    else el.disabled = true;
                    board.appendChild(el);
                }
            }
            const openSafe = state.board.flat().filter(x => x === 'star').length;
            const totalSafe = state.rows * state.cols - state.mines;
            document.getElementById('safeBadge').textContent = `Safe: ${openSafe} / ${totalSafe}`;
            document.getElementById('progress').style.width = totalSafe ? Math.round(openSafe / totalSafe * 100) + '%' : '0%';

            const st = document.getElementById('status');
            if (state.gameOver) {
                if (state.won) { st.textContent = '✅ You Win!'; showOverlay(true, 'You Win!', `გაიმარჯვე — ${openSafe}/${totalSafe}`, newGame); }
                else { st.textContent = '❌ Boom! You lost.'; showOverlay(false, 'Boom!', 'ბომბს დააჭირე. ისევ ვცადოთ?', newGame); }
            } else st.textContent = 'Open the stars — avoid the bombs.';
        }

        // ---------- AUTO PLAYER (NPC) ----------
        let autoPlayActive = false;
        let autoPlayTarget = 0;
        const delay = ms => new Promise(resolve => setTimeout(resolve, ms));

        document.getElementById('btnAutoPlay').addEventListener('click', async () => {
            if (autoPlayActive) return;
            if (state && state.gameOver) { await newGame(); await delay(500); }
            autoPlayActive = true;
            autoPlayTarget = parseInt(document.getElementById('autoClicks').value) || 8;
            await runAutoPlay(0);
        });

        async function runAutoPlay(clicksDone) {
            if (!autoPlayActive || clicksDone >= autoPlayTarget) { autoPlayActive = false; return; }
            const hiddenCells = [];
            for (let r = 0; r < state.rows; r++) {
                for (let c = 0; c < state.cols; c++) {
                    if (state.board[r][c] === 'hidden') hiddenCells.push({ r, c });
                }
            }
            if (hiddenCells.length === 0) { autoPlayActive = false; return; }
            const randomIndex = Math.floor(Math.random() * hiddenCells.length);
            const cell = hiddenCells[randomIndex];

            await reveal(cell.r, cell.c);
            await delay(600);

            if (state.gameOver) {
                if (!state.won) {
                    await delay(1200); await newGame(); await delay(500); await runAutoPlay(0);
                } else { autoPlayActive = false; }
            } else { await runAutoPlay(clicksDone + 1); }
        }

        // ==============================================
        // TIC-TAC-TOE LOGIC (REAL API)
        // ==============================================
        let currentTicTacToeId = null;

        async function startTicTacToe() {
            try {
                const response = await fetch('/api/tictactoe/new', { method: 'POST' });
                if (!response.ok) throw new Error("API not responding");
                const data = await response.json();
                currentTicTacToeId = data.id;
                renderTicTacToeBoard(data.board, data.winner);
            } catch (error) { console.error("API Error:", error); }
        }

        function renderTicTacToeBoard(board, winner) {
            const boardDiv = document.getElementById('tictactoe-board');
            boardDiv.innerHTML = '';

            board.forEach((cell, index) => {
                const btn = document.createElement('button');
                btn.innerText = cell;

                let cls = 'ttt-cell ';
                if (cell === 'X') cls += 'x';
                else if (cell === 'O') cls += 'o';
                else cls += 'empty';
                btn.className = cls;
                btn.style.cursor = (cell === '' && winner === '') ? 'pointer' : 'default';

                if (cell === '' && winner === '') btn.onclick = () => makeTicTacToeMove(index);
                boardDiv.appendChild(btn);
            });

            if (winner) {
                setTimeout(() => {
                    if (winner === 'Draw') showOverlay(true, "ფრე! 🤝", "კარგად ითამაშე. ისევ ვცადოთ?", startTicTacToe);
                    else showOverlay(true, "🎉 თამაში დასრულდა!", `მოიგო: ${winner}-მა!`, startTicTacToe);
                }, 150);
            }
        }

        async function makeTicTacToeMove(index) {
            if (!currentTicTacToeId) return;
            try {
                const response = await fetch(`/api/tictactoe/${currentTicTacToeId}/move?index=${index}&player=X`, { method: 'POST' });
                if (!response.ok) throw new Error("Move failed");
                const data = await response.json();
                renderTicTacToeBoard(data.board, data.winner);
            } catch (error) { console.error("Move Error:", error); }
        }

        // ==============================================
        // INITIALIZATION
        // ==============================================
        document.addEventListener('DOMContentLoaded', () => {
            // გვერდის ჩატვირთვისას ავტომატურად ვუშვებთ პირველ თამაშს
            newGame();
        });
    </script>
</body>
</html>
