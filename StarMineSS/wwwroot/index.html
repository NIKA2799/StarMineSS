<!doctype html>
<html lang="ka">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Stars vs Bombs</title>
  <style>
    :root{
      /* Blue casino vibe */
      --bg:#061731;
      --grad1:#0c2a68;
      --grad2:#0a1f4d;
      --panel:#0a2f73cc;
      --panel-border:#163d86;
      --soft:#0b2a63;
      --text:#eef3ff;
      --muted:#a9b8dd;
      --primary:#2aa0ff;
      --accent:#41e0ff;

      --tile:#173caa;
      --tile-border:#1c4ed8;
      --tile-hover:#1b47c9;

      --tile-star1:#f9cf4a;
      --tile-star2:#f59e0b;

      --tile-bomb1:#1f2937;
      --tile-bomb2:#0b1323;

      --radius:18px;
      --shadow:0 16px 40px rgba(0,0,0,.45);
      --cell:clamp(56px,5.6vw,74px);
      --gap:10px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;color:var(--text);
      background:
        radial-gradient(1200px 800px at 85% -10%, #13377e 0%, transparent 60%),
        radial-gradient(900px 700px at -10% 110%, #0b2b66 0%, transparent 55%),
        linear-gradient(180deg, var(--grad1), var(--grad2));
      font:16px/1.45 Inter,system-ui,Segoe UI,Roboto,Arial,sans-serif;
      letter-spacing:.2px;
    }
    .wrap{max-width:1100px;margin:34px auto;padding:0 18px}

    /* HEADER */
    .head{display:flex;align-items:center;gap:14px;margin-bottom:14px}
    .badgeBrand{
      width:40px;height:40px;border-radius:12px;display:grid;place-items:center;
      background:linear-gradient(135deg,var(--accent),var(--primary));
      box-shadow:0 10px 22px rgba(65,224,255,.28);
    }
    .title{font-weight:900;font-size:24px}
    .subtitle{color:var(--muted);font-weight:600}

    /* CONTROL BAR */
    .panel{background:var(--panel);border:1px solid var(--panel-border);
      border-radius:var(--radius);box-shadow:var(--shadow)}
    .controls{display:flex;flex-wrap:wrap;align-items:center;gap:10px;padding:14px 14px}
    .chip{
      display:flex;align-items:center;gap:10px;
      padding:10px 12px;border-radius:12px;
      background:#0a2b69; border:1px solid #174090; color:var(--text);
    }
    .chip input{width:70px;background:transparent;border:0;outline:none;color:#fff;font-weight:800}
    .btn{
      padding:10px 16px;border-radius:12px;border:0;font-weight:800;cursor:pointer;
      color:#08142b;background:linear-gradient(135deg,#7cc9ff,#2aa0ff);
      box-shadow:0 10px 18px rgba(42,160,255,.35); transition:transform .06s ease, filter .2s ease
    }
    .btn:hover{filter:brightness(1.06)}
    .btn:active{transform:translateY(1px)}
    .right{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .pill{
      padding:8px 12px;border-radius:999px;border:1px solid #174090;background:#0a2b69;color:#cde3ff;font-weight:800;cursor:pointer
    }
    .pill.active{background:linear-gradient(135deg,#41e0ff,#2aa0ff);color:#02122b}
    .toggle{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;border:1px solid #174090;background:#0a2b69;color:#cfe8ff;font-weight:700}
    .toggle input{accent-color:#2aa0ff}

    /* STATUS */
    .status{margin:14px 4px 10px;font-weight:800}
    .progress{height:10px;border-radius:999px;background:#0b2b69;border:1px solid #174090;overflow:hidden}
    .progress>div{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--primary));transition:width .35s ease}

    /* BOARD */
    .boardWrap{margin-top:16px;padding:18px}
    .board{
      display:grid;gap:var(--gap);
      background:linear-gradient(180deg,#0b2a63,#092252);
      border-radius:22px;padding:18px;border:1px solid #153a85;
      box-shadow:inset 0 12px 30px rgba(0,0,0,.35);
    }
    .cell{
      width:var(--cell);height:var(--cell);display:grid;place-items:center;user-select:none;cursor:pointer;
      border-radius:14px;font-size:30px;font-weight:900;color:#d9e7ff;
      background:linear-gradient(180deg,var(--tile),#112e91);
      border:1px solid var(--tile-border);
      box-shadow:inset 0 6px 16px rgba(0,0,0,.45), 0 10px 18px rgba(0,0,0,.35);
      transition:transform .08s ease, filter .18s ease, background .18s ease
    }
    .cell:hover{filter:brightness(1.08)}
    .cell.revealed{transform:translateY(1px)}
    .cell.star{
      background:linear-gradient(180deg,var(--tile-star1),var(--tile-star2));
      color:#0b1220;border-color:#ffd261
    }
    .cell.bomb{
      background:linear-gradient(180deg,var(--tile-bomb1),var(--tile-bomb2));
      color:#fff;border-color:#374151
    }
    .dim{opacity:.65;filter:grayscale(.3)}
    @media (max-width:640px){.right{margin-left:0}}

    /* OVERLAY (win/lose) */
    .overlay{position:fixed;inset:0;display:grid;place-items:center;background:rgba(0,0,0,.45);opacity:0;pointer-events:none;transition:opacity .2s ease}
    .overlay.show{opacity:1;pointer-events:auto}
    .modal{min-width:280px;max-width:420px;text-align:center;padding:22px;border-radius:20px}
    .modal.win{background:linear-gradient(135deg,rgba(16,185,129,.95),rgba(34,197,94,.95));color:#052d1a}
    .modal.lose{background:linear-gradient(135deg,rgba(239,68,68,.96),rgba(185,28,28,.96));color:#2a0c0c}
    .modal h3{margin:0 0 10px;font-size:24px}
    .modal p{margin:0 0 16px;font-weight:800}
    .modal .btn{background:#08142b;color:#e6f0ff}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div class="badgeBrand">⭐</div>
      <div>
        <div class="title">Stars vs Bombs</div>
        <div class="subtitle">გახსენი ვარსკვლავები — მოერიდე ბომბებს</div>
      </div>
    </div>

    <div class="panel controls">
      <div class="chip">Rows <input id="rows" type="number" min="2" max="12" value="5"></div>
      <div class="chip">Cols <input id="cols" type="number" min="2" max="12" value="5"></div>
      <div class="chip">Mines <input id="mines" type="number" min="1" value="3"></div>

      <button class="pill" data-preset="easy">Easy</button>
      <button class="pill" data-preset="medium">Medium</button>
      <button class="pill" data-preset="hard">Hard</button>

      <button id="btnNew" class="btn">New Game</button>

      <div class="right">
        <div class="chip dim" id="sizeBadge">Size: 5×5</div>
        <div class="chip dim" id="minesBadge">Mines: 3</div>
        <div class="chip dim" id="safeBadge">Safe: 0 / 22</div>
        <label class="toggle"><input id="mute" type="checkbox">🔇 Mute</label>
        <label class="toggle">🔊 Vol <input id="vol" type="range" min="0" max="1" step="0.01" value="0.8" style="width:100px"></label>
      </div>
    </div>

    <div class="status" id="status">Open the stars — avoid the bombs.</div>
    <div class="progress panel" style="margin-bottom:8px"><div id="progress"></div></div>

    <div class="panel boardWrap">
      <div id="board" class="board"></div>
    </div>
  </div>

  <div id="overlay" class="overlay">
    <div id="modal" class="modal">
      <h3 id="modalTitle"></h3>
      <p id="modalText"></p>
      <button class="btn" onclick="dismissOverlay();newGame()">Play Again</button>
    </div>
  </div>

  <script>
    // ---------- AUDIO (Web Audio API; no external files) ----------
    let audio, gain, unlocked = false;
    function ensureAudio() {
      if (unlocked) return;
      audio = new (window.AudioContext || window.webkitAudioContext)();
      gain = audio.createGain(); gain.gain.value = parseFloat(document.getElementById('vol').value || '0.8');
      gain.connect(audio.destination);
      unlocked = true;
    }
    function setVolume(v){ if(gain) gain.gain.value = v; }
    function playClick(){
      if(isMuted() || !unlocked) return;
      const o = audio.createOscillator(), g = audio.createGain();
      o.type="sine"; o.frequency.value=650;
      g.gain.setValueAtTime(0.0001,audio.currentTime);
      g.gain.exponentialRampToValueAtTime(0.25,audio.currentTime+.01);
      g.gain.exponentialRampToValueAtTime(0.0001,audio.currentTime+.08);
      o.connect(g); g.connect(gain);
      o.start(); o.stop(audio.currentTime+.09);
    }
    function playStar(){
      if(isMuted() || !unlocked) return;
      const now=audio.currentTime;
      const o1=audio.createOscillator(), g1=audio.createGain();
      o1.type="triangle"; o1.frequency.setValueAtTime(880,now);
      o1.frequency.exponentialRampToValueAtTime(1320, now+0.08);
      g1.gain.setValueAtTime(.0001,now); g1.gain.exponentialRampToValueAtTime(.4, now+.01);
      g1.gain.exponentialRampToValueAtTime(.0001, now+.35);
      o1.connect(g1); g1.connect(gain); o1.start(now); o1.stop(now+.4);

      const o2=audio.createOscillator(), g2=audio.createGain();
      o2.type="sine"; o2.frequency.setValueAtTime(1760,now+.02);
      g2.gain.setValueAtTime(.0001,now+.02); g2.gain.exponentialRampToValueAtTime(.18, now+.04);
      g2.gain.exponentialRampToValueAtTime(.0001, now+.22);
      o2.connect(g2); g2.connect(gain); o2.start(now+.02); o2.stop(now+.25);
    }
    function playBomb(){
      if(isMuted() || !unlocked) return;
      const now=audio.currentTime;

      // sub-bass thump
      const o=audio.createOscillator(), g=audio.createGain();
      o.type="sine"; o.frequency.setValueAtTime(90,now);
      o.frequency.exponentialRampToValueAtTime(40,now+.25);
      g.gain.setValueAtTime(.0001, now);
      g.gain.exponentialRampToValueAtTime(.6, now+.01);
      g.gain.exponentialRampToValueAtTime(.0001, now+.4);
      o.connect(g); g.connect(gain); o.start(now); o.stop(now+.45);

      // white-noise burst
      const buffer=audio.createBuffer(1, audio.sampleRate*.5, audio.sampleRate);
      const data=buffer.getChannelData(0);
      for(let i=0;i<data.length;i++) data[i]=Math.random()*2-1;
      const noise=audio.createBufferSource(); noise.buffer=buffer;
      const nGain=audio.createGain(); nGain.gain.value=.35;
      const lp=audio.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=500;
      nGain.gain.exponentialRampToValueAtTime(.0001, now+.5);
      noise.connect(lp); lp.connect(nGain); nGain.connect(gain);
      noise.start(now); noise.stop(now+.5);
    }
    function isMuted(){ return document.getElementById('mute').checked; }

    // ---------- GAME ----------
    let state = null;
    const rowsEl = document.getElementById('rows');
    const colsEl = document.getElementById('cols');
    const minesEl= document.getElementById('mines');

    // init volume & unlock
    document.body.addEventListener('pointerdown', () => ensureAudio(), { once:true });
    document.getElementById('vol').addEventListener('input', e => setVolume(parseFloat(e.target.value || '0.6')));

    // Difficulty pills
    [...document.querySelectorAll('.pill')].forEach(p=>{
      p.addEventListener('click', ()=>{
        [...document.querySelectorAll('.pill')].forEach(x=>x.classList.remove('active'));
        p.classList.add('active');
        const preset=p.dataset.preset;
        if(preset==='easy'){ rowsEl.value=5; colsEl.value=5; minesEl.value=3; }
        if(preset==='medium'){ rowsEl.value=6; colsEl.value=6; minesEl.value=6; }
        if(preset==='hard'){ rowsEl.value=8; colsEl.value=8; minesEl.value=10; }
        newGame();
      });
    });

    // Inputs live clamp
    function syncBadges(){
      const rows=+rowsEl.value||5, cols=+colsEl.value||5;
      const maxM=Math.max(1, rows*cols-1);
      if(+minesEl.value>maxM) minesEl.value=maxM;
      if(+minesEl.value<1) minesEl.value=1;
      document.getElementById('sizeBadge').textContent=`Size: ${rows}×${cols}`;
      document.getElementById('minesBadge').textContent=`Mines: ${minesEl.value}`;
    }
    ['input','change'].forEach(evt=>{
      [rowsEl,colsEl,minesEl].forEach(el=>el.addEventListener(evt,()=>{syncBadges();}));
    });
    document.getElementById('btnNew').addEventListener('click', ()=>{ playClick(); newGame(); });

    async function newGame(){
      try{
        syncBadges();
        const rows=+rowsEl.value||5, cols=+colsEl.value||5, mines=Math.min(+minesEl.value||3, rows*cols-1);
        const res=await fetch(`/api/game/new?rows=${rows}&cols=${cols}&mines=${mines}`,{method:'POST'});
        if(!res.ok) throw new Error(await res.text());
        state=await res.json();
        hideOverlay(); render();
      }catch(e){
        console.error(e);
        document.getElementById('status').textContent='Failed to start game. Check API.';
      }
    }

    async function reveal(r,c){
      if(!state||state.gameOver) return;
      try{
        const res=await fetch(`/api/game/${state.id}/reveal?r=${r}&c=${c}`,{method:'POST'});
        if(!res.ok) throw new Error(await res.text());
        const prev=state; state=await res.json();
        // Decide sound based on the clicked cell result
        const cellType = state.board[r][c];
        if(cellType==='bomb') playBomb(); else playStar();
        render(true);
      }catch(e){ console.error(e); }
    }

    function render(pop=false){
      const board=document.getElementById('board');
      board.style.gridTemplateColumns=`repeat(${state.cols},var(--cell))`;
      board.innerHTML='';

      for(let r=0;r<state.rows;r++){
        for(let c=0;c<state.cols;c++){
          const t=state.board[r][c]; // hidden | star | bomb
          const el=document.createElement('button');
          el.className=`cell ${t}${t!=='hidden'?' revealed':''}`;
          el.textContent= t==='hidden' ? '' : (t==='bomb'?'💣':'⭐');
          if(t==='hidden' && !state.gameOver){
            el.addEventListener('click', ()=>reveal(r,c));
          } else el.disabled=true;
          board.appendChild(el);
        }
      }

      const openSafe=state.board.flat().filter(x=>x==='star').length;
      const totalSafe=state.rows*state.cols - state.mines;
      document.getElementById('safeBadge').textContent=`Safe: ${openSafe} / ${totalSafe}`;
      document.getElementById('progress').style.width= totalSafe? Math.round(openSafe/totalSafe*100)+'%':'0%';

      const st=document.getElementById('status');
      if(state.gameOver){
        if(state.won){ st.textContent='✅ You Win!'; showOverlay(true,'You Win!',`გაიმარჯვე — ${openSafe}/${totalSafe}`); }
        else { st.textContent='❌ Boom! You lost.'; showOverlay(false,'Boom!','ბომბს დააჭირე. ისევ ვცადოთ?'); }
      }else st.textContent='Open the stars — avoid the bombs.';
    }

    // Overlay helpers
    function showOverlay(win,title,text){
      const o=document.getElementById('overlay'), m=document.getElementById('modal');
      document.getElementById('modalTitle').textContent=title;
      document.getElementById('modalText').textContent=text;
      m.className=`modal ${win?'win':'lose'}`; o.classList.add('show');
    }
    function hideOverlay(){ document.getElementById('overlay').classList.remove('show'); }
    function dismissOverlay(){ hideOverlay(); }

    // first load
    syncBadges(); newGame();
  </script>
</body>
</html>
